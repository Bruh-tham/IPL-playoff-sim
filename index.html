<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Playoffs Simulator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏏</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Variables */
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --tile-hover: rgba(37, 99, 235, 0.08);
            --shadow: rgba(0, 0, 0, 0.1);
        }

        /* Dark Theme Variables */
        body.dark-theme {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --background: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --tile-hover: rgba(59, 130, 246, 0.15);
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            padding: 30px 40px;
            margin: 0 auto;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            position: relative;
            max-width: 1400px;
        }

        .theme-toggle-top {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: var(--text);
            color: var(--background) !important;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .theme-toggle-top:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 2rem;
            color: var(--primary);
            text-align: center;
        }

        h2 {
            color: var(--text);
            margin-bottom: 1.5rem;
        }

        table {
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
            background: var(--card);
            box-shadow: 0 4px 6px -1px var(--shadow);
            width: 100%;
            max-width: 1100px;
            margin: 0 auto 2rem;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            transition: background-color 0.3s;
        }

        th {
            background: var(--primary);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            padding: 1rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }

        /* Fixed alignment for team column */
        .team-name {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100px; 
            margin: 0 auto;
            text-align: left;
        }

        .team-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .team-name span {
            width: 50px; 
        }

        .simulator {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        /* --- Team Filters --- */
        .filter-header {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .team-filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .filter-btn {
            background: transparent;
            border: 2px solid transparent;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px;
        }

        .filter-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            border-color: var(--primary);
            background: var(--tile-hover);
            transform: scale(1.05);
        }

        .filter-btn.dimmed img {
            opacity: 0.3;
            filter: grayscale(80%);
        }

        .filter-btn:hover:not(.active) img {
            opacity: 0.7;
            filter: grayscale(40%);
        }

        /* --- Schedule Grid --- */
        #matchList {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            width: 100%;
        }

        .match-row {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 0;
            box-shadow: 0 4px 8px var(--shadow);
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .match-info {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .match-teams {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0;
        }

        .team-tile {
            width: 120px;
            position: relative;
            cursor: pointer;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid var(--border);
        }

        .team-tile span {
            font-weight: 500;
            display: block;
        }

        .team-tile:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .team-tile.selected {
            background: var(--tile-hover);
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(0.98);
            box-shadow: inset 0 0 0 1.5px var(--primary);
        }

        .team-tile img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin: 0 auto 8px;
            display: block;
        }

        .match-nr {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .match-nr button {
            font-family: 'Poppins', sans-serif;
            background: transparent;
            color: var(--text);
            border: 2px solid var(--border);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 140px;
        }

        .match-nr button:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .match-nr button.selected {
            background: var(--tile-hover);
            color: var(--primary);
            border-color: var(--primary);
            transform: scale(0.98);
        }

        .action-buttons {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 100;
        }

        .action-buttons button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-top { background: var(--success); }
        .btn-reset { background: var(--danger); }

        .action-buttons button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .chance-high { color: var(--success); font-weight: 600; }
        .chance-medium { color: var(--warning); font-weight: 600; }
        .chance-low { color: var(--danger); font-weight: 600; }

        .change-indicator { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
        .change-pts { font-weight: 600; font-size: 0.9rem; }
        .change-pts.positive { color: var(--success); }
        .change-pts.negative { color: var(--danger); }
        .change-pts.neutral { color: var(--text-muted); }
        .change-pct { font-size: 0.85rem; display: flex; align-items: center; gap: 2px; }
        .change-pct.up { color: var(--success); }
        .change-pct.down { color: var(--danger); }
        .change-pct.same { color: var(--text-muted); }

        /* --- Updated Footer --- */
        .footer {
            text-align: center;
            padding: 1.25rem;
            margin: 2rem auto 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-muted);
            background-color: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px var(--shadow);
            font-size: 0.95rem;
            max-width: 1100px;
        }

        .footer a {
            color: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer a:hover { color: var(--primary); }
        .footer svg { width: 16px; height: 16px; }
        .heart { color: var(--danger); display: inline-block; margin: 0 0.25rem; }
        .position-change { display: inline-flex; align-items: center; gap: 0.5rem; }
        .position-up { color: var(--success); }
        .position-down { color: var(--danger); }

        /* --- Media Queries --- */
        @media (max-width: 1200px) { 
            body { padding: 30px; } 
        }
        
        /* Mobile Landscape Specific Tuning */
        @media (max-width: 950px) and (orientation: landscape) {
            body { padding: 15px 25px; }
            h1 { font-size: 1.8rem; margin-bottom: 1rem; padding-right: 50px; }
            .theme-toggle-top { top: 15px; right: 25px; width: 38px; height: 38px; font-size: 1rem; }
            .filter-header { margin-bottom: 0.5rem; }
            .team-filters { margin-bottom: 1rem; gap: 0.5rem; }
            .filter-btn { width: 42px; height: 42px; padding: 2px; }
            #matchList { gap: 1rem; }
            
            /* Squish the match cards vertically */
            .match-row { padding: 0.75rem 1rem; }
            .match-info { margin-bottom: 0.5rem; font-size: 0.8rem; }
            .match-teams { margin: 0.5rem 0; gap: 1rem; }
            .team-tile { width: 95px; padding: 0.5rem; }
            .team-tile img { width: 32px; height: 32px; margin-bottom: 4px; }
            .team-tile span { font-size: 0.9rem; }
            .match-nr { margin-top: 0.5rem; }
            .match-nr button { padding: 0.5rem 1.25rem; font-size: 0.85rem; min-width: 110px; }
            
            .action-buttons { bottom: 1rem; right: 1rem; }
            .action-buttons button { width: 38px; height: 38px; font-size: 1rem; }
        }

        @media (max-width: 900px) and (orientation: portrait) {
            .theme-toggle-top { top: 20px; right: 20px; width: 36px; height: 36px; font-size: 1rem; }
            h1 { font-size: 2rem; margin-top: 10px; padding-right: 40px; } 
        }

        @media (max-width: 768px) {
            body { padding: 20px 15px; }
            table { font-size: 0.85rem; display: block; overflow-x: auto; white-space: nowrap; }
            th, td { padding: 0.75rem; }
            .team-logo { width: 24px; height: 24px; }
            .team-name { width: 85px; gap: 0.5rem; } 
            .team-filters { gap: 0.5rem; }
            .filter-btn { width: 45px; height: 45px; }
            
            /* Tighter elements for standard mobile portrait */
            .match-row { padding: 1rem; }
            .match-teams { gap: 1rem; }
            .team-tile { width: 90px; padding: 0.75rem; }
            .team-tile img { width: 30px; height: 30px; }
            .team-tile span { font-size: 0.85rem; }
            .match-info { font-size: 0.85rem; }
            .match-nr button { padding: 0.6rem 1.5rem; font-size: 0.9rem; }
            
            .action-buttons { bottom: 1.5rem; right: 1.5rem; }
        }
        
        @media (max-width: 650px) {
            /* Snaps to 1 column ONLY on small portrait phones */
            #matchList { grid-template-columns: 1fr; }
            h1 { font-size: 1.75rem; }
        }
    </style>
</head>

        {num: 63, date:'18-05-2026', time:'7:30 PM', home:'CSK', away:'SRH', completed: false, selectedWinner: null},
        {num: 64, date:'19-05-2026', time:'7:30 PM', home:'RR', away:'LSG', completed: false, selectedWinner: null},
        {num: 65, date:'20-05-2026', time:'7:30 PM', home:'KKR', away:'MI', completed: false, selectedWinner: null},
        {num: 66, date:'21-05-2026', time:'7:30 PM', home:'CSK', away:'GT', completed: false, selectedWinner: null},
        {num: 67, date:'22-05-2026', time:'7:30 PM', home:'SRH', away:'RCB', completed: false, selectedWinner: null},
        {num: 68, date:'23-05-2026', time:'7:30 PM', home:'LSG', away:'PBKS', completed: false, selectedWinner: null},
        {num: 69, date:'24-05-2026', time:'3:30 PM', home:'MI', away:'RR', completed: false, selectedWinner: null},
        {num: 70, date:'24-05-2026', time:'7:30 PM', home:'KKR', away:'DC', completed: false, selectedWinner: null}
    ];

    let teams = JSON.parse(JSON.stringify(initialTeams));
    let schedule = JSON.parse(JSON.stringify(initialSchedule));
    let initialSortedTeams = null;
    let activeFilters = new Set(); 

    // --- Core Logic ---

    function recalculateStandings() {
        teams = JSON.parse(JSON.stringify(initialTeams));
        let teamMap = {};
        teams.forEach(t => teamMap[t.name] = t);

        schedule.forEach(match => {
            if (match.completed && match.selectedWinner) {
                const t1 = teamMap[match.home];
                const t2 = teamMap[match.away];
                
                t1.P++;
                t2.P++;
                
                if (match.selectedWinner === "NR") {
                    t1.NR++;
                    t2.NR++;
                    t1.Pts += 1;
                    t2.Pts += 1;
                } else if (match.selectedWinner === t1.name) {
                    t1.W++;
                    t1.Pts += 2;
                    t2.L++;
                } else if (match.selectedWinner === t2.name) {
                    t2.W++;
                    t2.Pts += 2;
                    t1.L++;
                }
            }
        });
        
        teams = Object.values(teamMap);
    }

    function simulateMonteCarlo(numSimulations = 10000) {
        const top4Count = {};
        const top2Count = {};
        
        teams.forEach(t => {
            top4Count[t.name] = 0;
            top2Count[t.name] = 0;
        });

        const remainingMatches = schedule.filter(m => !m.completed);
        const baseTeamsArray = teams.map(t => ({ name: t.name, Pts: t.Pts, NRR: t.NRR }));

        for (let sim = 0; sim < numSimulations; sim++) {
            let simTeams = baseTeamsArray.map(t => ({...t}));
            let teamMap = {};
            simTeams.forEach(t => teamMap[t.name] = t);

            for (let i = 0; i < remainingMatches.length; i++) {
                const match = remainingMatches[i];
                const random = Math.random();
                
                if (random < 0.49) {
                    teamMap[match.home].Pts += 2;
                } else if (random < 0.98) {
                    teamMap[match.away].Pts += 2;
                } else {
                    teamMap[match.home].Pts += 1;
                    teamMap[match.away].Pts += 1;
                }
            }

            simTeams.sort((a, b) => {
                if (b.Pts !== a.Pts) return b.Pts - a.Pts;
                const simNrrA = a.NRR + (Math.random() * 0.4 - 0.2); 
                const simNrrB = b.NRR + (Math.random() * 0.4 - 0.2);
                return simNrrB - simNrrA;
            });

            for(let i=0; i<4; i++) {
                if(simTeams[i]) {
                    top4Count[simTeams[i].name]++;
                    if(i < 2) top2Count[simTeams[i].name]++;
                }
            }
        }

        teams.forEach(team => {
            team.top4Chance = ((top4Count[team.name] / numSimulations) * 100).toFixed(2);
            team.top2Chance = ((top2Count[team.name] / numSimulations) * 100).toFixed(2);
        });
    }

    function handleButtonClick(index, winner) {
        const fixture = schedule[index];
        
        if (fixture.selectedWinner === winner) {
            fixture.selectedWinner = null;
            fixture.completed = false;
        } else {
            fixture.selectedWinner = winner;
            fixture.completed = true;
        }

        recalculateStandings();
        simulateMonteCarlo();
        renderTable();
        renderSchedule();
    }

    function resetData() {
        schedule = JSON.parse(JSON.stringify(initialSchedule));
        activeFilters.clear();
        recalculateStandings();
        simulateMonteCarlo();
        renderFilters();
        renderTable();
        renderSchedule();
    }

    function toggleFilter(teamName) {
        if (activeFilters.has(teamName)) {
            activeFilters.delete(teamName);
        } else {
            activeFilters.add(teamName);
        }
        renderFilters();
        renderSchedule();
    }

    // --- Rendering ---

    function renderFilters() {
        const container = document.getElementById("teamFilters");
        container.innerHTML = "";
        
        Object.keys(teamLogos).forEach(team => {
            const btn = document.createElement("button");
            const isActive = activeFilters.size === 0 || activeFilters.has(team);
            btn.className = `filter-btn ${isActive ? 'active' : 'dimmed'}`;
            btn.title = `Filter matches for ${team}`;
            btn.onclick = () => toggleFilter(team);
            btn.innerHTML = `<img src="${teamLogos[team]}" alt="${team}">`;
            container.appendChild(btn);
        });
    }

    function renderTable() {
        const tableBody = document.querySelector("#pointsTable tbody");
        tableBody.innerHTML = "";
        
        const sortedTeams = [...teams].sort((a, b) => {
            if (b.Pts !== a.Pts) return b.Pts - a.Pts;
            return b.NRR - a.NRR;
        });

        if (!initialSortedTeams) {
            initialSortedTeams = sortedTeams.map(team => team.name);
        }

        sortedTeams.forEach((team, index) => {
            const originalIndex = initialSortedTeams.indexOf(team.name);
            const positionChange = originalIndex - index;
            const positionDisplay = positionChange !== 0 ? 
                `<span class="position-change ${positionChange > 0 ? 'position-up' : 'position-down'}">
                    <span class="position-arrow">${positionChange > 0 ? '▲' : '▼'}</span>${Math.abs(positionChange)}
                </span>` : '';

            const originalTeam = initialTeams.find(t => t.name === team.name);
            const pointsGained = team.Pts - originalTeam.Pts;
            const pctChange = (parseFloat(team.top4Chance) - (originalTeam.originalTop4 || 0)).toFixed(2);

            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${index + 1} ${positionDisplay}</td>
                <td>
                    <div class="team-name">
                        <img src="${teamLogos[team.name]}" alt="${team.name}" class="team-logo">
                        <span>${team.name}</span>
                    </div>
                </td>
                <td>${team.P}</td>
                <td>${team.W}</td>
                <td>${team.L}</td>
                <td>${team.NR}</td>
                <td>${team.NRR > 0 ? '+' : ''}${team.NRR.toFixed(3)}</td>
                <td>${team.Pts}</td>
                <td class="${getChanceClass(team.top4Chance)}">${team.top4Chance}%</td>
                <td class="${getChanceClass(team.top2Chance)}">${team.top2Chance}%</td>
                <td>
                    <div class="change-indicator">
                        <span class="change-pts ${pointsGained > 0 ? 'positive' : pointsGained < 0 ? 'negative' : 'neutral'}">
                            ${pointsGained > 0 ? '+' : ''}${pointsGained}
                        </span>
                        <span class="change-pct ${pctChange > 0 ? 'up' : pctChange < 0 ? 'down' : 'same'}">
                            ${Math.abs(pctChange)}%
                            <span class="arrow">${pctChange > 0 ? '▲' : pctChange < 0 ? '▼' : ''}</span>
                        </span>
                    </div>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    function getChanceClass(value) {
        if (value >= 75) return 'chance-high';
        if (value >= 25) return 'chance-medium';
        return 'chance-low';
    }

    function renderSchedule() {
        const matchList = document.getElementById("matchList");
        matchList.innerHTML = "";
        
        schedule.forEach((fixture, originalIndex) => {
            if (activeFilters.size > 0 && !activeFilters.has(fixture.home) && !activeFilters.has(fixture.away)) {
                return;
            }

            const div = document.createElement("div");
            div.className = `match-row ${fixture.completed ? 'completed' : ''}`;
            div.innerHTML = `
                <div class="match-info">
                    Match ${fixture.num} • ${fixture.date} • ${fixture.time}
                </div>
                <div class="match-teams">
                    <div class="team-tile ${fixture.selectedWinner === fixture.home ? 'selected' : ''}" 
                        onclick="handleButtonClick(${originalIndex}, '${fixture.home}')">
                        <img src="${teamLogos[fixture.home]}" alt="${fixture.home}">
                        <span>${fixture.home}</span>
                    </div>
                    <div style="font-weight: 600; opacity: 0.5; align-self: center;">VS</div>
                    <div class="team-tile ${fixture.selectedWinner === fixture.away ? 'selected' : ''}"
                        onclick="handleButtonClick(${originalIndex}, '${fixture.away}')">
                        <img src="${teamLogos[fixture.away]}" alt="${fixture.away}">
                        <span>${fixture.away}</span>
                    </div>
                </div>
                <div class="match-nr">
                    <button onclick="handleButtonClick(${originalIndex}, 'NR')"
                        class="${fixture.selectedWinner === 'NR' ? 'selected' : ''}">
                        No Result
                    </button>
                </div>
            `;
            matchList.appendChild(div);
        });
    }

    document.addEventListener("DOMContentLoaded", function() {
        simulateMonteCarlo();
        
        initialTeams.forEach(team => {
            const simTeam = teams.find(t => t.name === team.name);
            team.originalTop4 = parseFloat(simTeam.top4Chance) || 0;
            team.originalTop2 = parseFloat(simTeam.top2Chance) || 0;
        });
        
        renderFilters();
        renderTable();
        renderSchedule();
    });
</script>
